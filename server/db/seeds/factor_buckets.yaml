# 80-bucket factor/thematic universe (DESIGN.md §9).
# Each bucket is a concept tracked via a candidate basket of ETFs. The single
# `representative` ETF is chosen later by PCA (§3.4, factor_pca job) — this seed
# only declares the candidate baskets; representative_id stays NULL until PCA runs.
# `kind` ∈ index | factor | sector | sub_sector | intl | commodity | thematic
buckets:
  # --- Broad equity indices (5) ---
  - {kind: index, label: "S&P 500",                    candidates: [SPY, IVV, VOO]}
  - {kind: index, label: "Nasdaq-100",                 candidates: [QQQ, QQQM]}
  - {kind: index, label: "Russell 2000 / small-cap",   candidates: [IWM, IJR, VB, VTWO]}
  - {kind: index, label: "Mid-cap",                    candidates: [IJH, MDY, VO]}
  - {kind: index, label: "Equal-weight S&P",           candidates: [RSP, EQAL]}

  # --- Volatility regime (1) ---
  - {kind: factor, label: "VIX",                       candidates: [VIXY, VXX, UVXY]}

  # --- Rates curve (5) ---
  - {kind: factor, label: "Short rates (front end)",   candidates: [SHV, BIL]}
  - {kind: factor, label: "7-10Y rates (belly)",       candidates: [IEF, VGIT]}
  - {kind: factor, label: "20+Y rates (long end)",     candidates: [TLT, VGLT, EDV]}
  - {kind: factor, label: "TIPS / inflation-linked",   candidates: [TIP, SCHP, VTIP]}
  - {kind: factor, label: "Mortgage-backed",           candidates: [MBB, VMBS]}

  # --- Credit (4) ---
