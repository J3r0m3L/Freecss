  - {kind: factor, label: "Investment Grade",          candidates: [LQD, VCIT]}
  - {kind: factor, label: "EM Debt (USD)",             candidates: [EMB, PCY]}
  - {kind: factor, label: "Bank Loans / Floating Rate", candidates: [BKLN, SRLN]}

  # --- FX (4) ---
